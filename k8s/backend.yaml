apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: webide-data-pvc
  namespace: webide
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: webide-projects-pvc
  namespace: webide
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webide-backend
  namespace: webide
  labels:
    app: webide-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webide-backend
  template:
    metadata:
      labels:
        app: webide-backend
    spec:
      containers:
        - name: webide-backend
          image: registry.sviniabanditka.com/webide-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: webide-backend-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: projects
              mountPath: /app/projects
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: webide-data-pvc
        - name: projects
          persistentVolumeClaim:
            claimName: webide-projects-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: webide-backend
  namespace: webide
spec:
  selector:
    app: webide-backend
  ports:
    - port: 8080
      targetPort: 8080
